name: ✨ Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature!
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Is there a problem or gap this feature would solve?
      placeholder: I'm always frustrated when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What should happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Any alternative solutions or workarounds you've considered?
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Audio / Player
        - Resolving / Sources
        - API / REST
        - Plugin system
        - Configuration
        - Performance
        - Other
      multiple: true
