name: 🐛 Bug Report
description: Report something not working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `sonata ...`
        2. Send request to `/...`
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
  - type: textarea
    id: logs
    attributes:
      label: Logs & Error Output
      description: Paste any relevant logs or error messages.
      render: shell
  - type: input
    id: version
    attributes:
      label: Version
      description: Run `sonata --version` and paste the output.
      placeholder: e.g. Sonata v4.1.0 (build 2)
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux
        - macOS
        - Windows (WSL)
        - Docker
      multiple: true
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Config (sensitive info removed)
      description: Paste relevant parts of your config file (redact tokens/keys).
      render: yaml
