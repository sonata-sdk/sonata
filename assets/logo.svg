<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="400" y2="400">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="400" x2="400" y2="0">
      <stop offset="0%" stop-color="#a855f7" stop-opacity=".15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="url(#g2)" stroke="url(#g)" stroke-width="2"/>
  <!-- Sound waves -->
  <path d="M100 200 Q120 160 140 200 Q160 240 180 200" stroke="url(#g)" stroke-width="6" stroke-linecap="round" fill="none" opacity=".6"/>
  <path d="M80 200 Q110 140 140 200 Q170 260 200 200" stroke="url(#g)" stroke-width="5" stroke-linecap="round" fill="none" opacity=".4"/>
  <path d="M60 200 Q100 120 140 200 Q180 280 220 200" stroke="url(#g)" stroke-width="4" stroke-linecap="round" fill="none" opacity=".25"/>
  <!-- Music note -->
  <g transform="translate(160, 120)">
    <!-- Stem -->
    <rect x="28" y="0" width="6" height="100" rx="3" fill="url(#g)"/>
    <!-- Note head -->
    <ellipse cx="20" cy="100" rx="22" ry="14" fill="url(#g)" transform="rotate(-20, 20, 100)"/>
    <!-- Flag -->
    <path d="M34 30 Q60 20 70 40 Q55 35 34 50" fill="url(#g)"/>
    <path d="M34 55 Q60 45 70 65 Q55 60 34 75" fill="url(#g)"/>
  </g>
  <!-- Play button triangle -->
  <g transform="translate(280, 280)">
    <polygon points="0,0 30,18 0,36" fill="url(#g)" opacity=".8"/>
  </g>
  <!-- Text -->
  <text x="200" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="url(#g)" letter-spacing="4">SONATA</text>
</svg>
